<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الحقيبة الإسلامية الذكية</title>
    
    <style>
        /* التنسيقات العامة والمتجاوبة */
        :root {
            --bg-app: #f1f5f9;
            --container-bg: #fbeee8; /* البيج الوردي الناعم المريح للعين */
            --primary: #008080; /* زيتي فخم للأوراد والمسبحة */
            --primary-dark: #004d4d;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-gold: #fbbf24;
            --nav-bg: #ffffff;
        }

        body {
            font-family: 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-app);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none;
            box-sizing: border-box;
        }

        /* حاوية الهاتف المتجاوبة بمرونة تامة */
        .phone-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background-color: var(--container-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
        }

        @media (min-width: 450px) {
            .phone-container {
                height: 92vh;
                border-radius: 30px;
                box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            }
        }

        /* شريط الإحصائيات والتقدم العلوي */
        .app-header {
            background-color: #ffffff;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: bold;
            z-index: 10;
            flex-shrink: 0;
        }

        .reset-section-btn {
            background: none;
            border: 1px solid #ebd0ce;
            color: #e74c3c;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* مساحة المحتوى الديناميكي القابلة للتبديل */
        .app-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding-bottom: 90px; /* تفادي تداخل المحتوى مع شريط التنقل */
        }

        /* إخفاء الأقسام غير النشطة */
        .app-section {
            display: none;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
            flex: 1;
        }

        .app-section.active {
            display: flex;
        }

        /* ==================== استايل قسم المسبحة الإلكترونية ==================== */
        .tasbeeh-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            flex: 1;
            width: 100%;
        }

        .tasbeeh-select {
            width: 90%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ebd0ce;
            background-color: #fff;
            font-family: 'Cairo';
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--text-dark);
            text-align: center;
            outline: none;
        }

        .tasbeeh-counter-display {
            font-size: 5.5rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin: 15px 0;
        }

        .tasbeeh-target-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* أزرار الأهداف السريعة في المسبحة */
        .target-buttons-row {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .target-btn {
            background-color: #ffffff;
            border: 1px solid #ebd0ce;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-dark);
            cursor: pointer;
        }

        .target-btn.active {
            background-color: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
        }

        /* زر التسبيح الضخم الفاخر */
        .tasbeeh-clicker-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: 6px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0, 128, 128, 0.3);
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s ease;
        }

        .tasbeeh-clicker-btn:active {
            transform: scale(0.94);
        }

        .tasbeeh-reset-btn {
            background-color: #ffffff;
            border: 1px solid #ebd0ce;
            padding: 5px 15px;
            border-radius: 20px;
            color: #e74c3c;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        /* ==================== استايل كروت الأذكار الذكية ==================== */
        .zkr-counter-num {
            font-size: 4.5rem;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
            line-height: 1;
        }

        .zkr-counter-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 4px;
            font-weight: 600;
        }

        .card-inner-box {
            background: #ffffff;
            border-radius: 24px;
            padding: 22px 18px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.03);
            border-bottom: 5px solid var(--primary);
            position: relative;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            margin: 15px 0;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card-inner-box.completed {
            border-bottom-color: #2c3e50;
        }

        .dhikr-title-label {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .dhikr-text-box {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.65;
            color: var(--text-dark);
            text-align: justify;
            text-align-last: center;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            white-space: pre-line;
            width: 100%;
        }

        .dhikr-text-box.expanded {
            display: block;
            overflow: visible;
            -webkit-line-clamp: unset;
        }

        .more-btn {
            background: #ebd0ce;
            color: #e74c3c;
            border: none;
            padding: 3px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        .dhikr-benefit-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 12px;
            font-style: italic;
            line-height: 1.4;
        }

        /* شريط التوجيه السفلي داخل قسم الذكر */
        .zkr-nav-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .nav-arrow-btn {
            background-color: #ffffff;
            border: 1px solid #ebd0ce;
            color: var(--text-dark);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .zkr-progress-dots {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        /* غطاء نجاح واكتمال الذكر الفردي */
        .card-success-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 128, 128, 0.96);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            z-index: 5;
            display: none;
        }

        .card-success-overlay.show {
            display: flex;
        }

        /* غطاء الإتمام الكلي لجميع عناصر القسم */
        .full-section-completion {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--primary);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            z-index: 6;
            display: none;
            text-align: center;
        }

        .full-section-completion.show {
            display: flex;
        }

        /* ==================== شريط التنقل السفلي الفاخر المكون من 6 أزرار ==================== */
        .bottom-nav-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 75px;
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #ebd0ce;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.04);
            z-index: 100;
            padding: 0 5px;
        }

        .nav-item-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Cairo';
            gap: 2px;
        }

        .nav-item-btn .nav-icon {
            font-size: 1.35rem;
            transition: transform 0.2s ease;
        }

        .nav-item-btn .nav-text {
            font-size: 0.72rem;
            font-weight: 600;
        }

        /* مظهر الزر النشط المحدد حالياً */
        .nav-item-btn.active {
            color: var(--primary);
        }

        .nav-item-btn.active .nav-icon {
            transform: translateY(-4px) scale(1.15);
        }

        .nav-item-btn.active .nav-text {
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div class="app-header">
            <div id="headerProgressText">المسبحة الإلكترونية</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="reset-section-btn" onclick="resetCurrentSectionData()">🔄 تصفير القسم</button>
                <div id="headerPercentage">0%</div>
            </div>
        </div>

        <div class="app-content">

            <div id="section_tasbeeh" class="app-section active">
                <div class="tasbeeh-wrapper">
                    <select id="tasbeehPhrases" class="tasbeeh-select" onchange="resetTasbeehCount()">
                        <option value="سُبْحَانَ اللَّهِ">سُبْحَانَ اللَّهِ</option>
                        <option value="الْحَمْدُ لِلَّهِ">الْحَمْدُ لِلَّهِ</option>
                        <option value="لَا إِلَهَ إِلَّا اللَّهُ">لَا إِلَهَ إِلَّا اللَّهُ</option>
                        <option value="اللَّهُ أَكْبَرُ">اللَّهُ أَكْبَرُ</option>
                        <option value="لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ">لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ</option>
                        <option value="أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ">أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ</option>
                        <option value="اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ">اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّدٍ</option>
                    </select>

                    <div id="tasbeehDisplay" class="tasbeeh-counter-display">0</div>
                    <div id="tasbeehTargetLabel" class="tasbeeh-target-label">الهدف: مفتوح</div>

                    <div class="target-buttons-row">
                        <button class="target-btn active" onclick="setTasbeehTarget(0, this)">مفتوح</button>
                        <button class="target-btn" onclick="setTasbeehTarget(33, this)">33</button>
                        <button class="target-btn" onclick="setTasbeehTarget(100, this)">100</button>
                        <button class="target-btn" onclick="promptCustomTarget(this)">مخصص</button>
                    </div>

                    <button class="tasbeeh-clicker-btn" onclick="handleTasbeehClick()">اضغط</button>
                    
                    <button class="tasbeeh-reset-btn" onclick="resetTasbeehCount()">🔄 تصفير العداد</button>
                </div>
            </div>

            <div id="section_azkar_template" class="app-section">
                <div style="text-align: center; margin: 5px 0;">
                    <div id="zkrCounter" class="zkr-counter-num">0</div>
                    <div id="zkrCounterLabel" class="zkr-counter-label">العدد المطلوب: 1</div>
                </div>

                <div class="card-inner-box" id="zkrCard" onclick="handleAzkarCardClick()">
                    <div class="dhikr-title-label" id="zkrTitle">تحميل...</div>
                    <div class="dhikr-text-box" id="zkrText">جاري جلب نص الذكر المبارك...</div>
                    <button class="more-btn" id="zkrMoreBtn" onclick="toggleZkrText(event)">المزيد</button>
                    <div class="dhikr-benefit-text" id="zkrBenefit">الفضل...</div>

                    <div class="card-success-overlay" id="zkrSuccessOverlay">
                        <div style="font-size: 2.8rem; margin-bottom: 8px;">✓</div>
                        <div style="font-size: 1.2rem; font-weight: bold;">تم الإتمـام</div>
                        <div style="font-size: 0.85rem; opacity: 0.8; margin-top: 4px;">انتقل للتالي بالأسفل</div>
                    </div>

                    <div class="full-section-completion" id="zkrFullSectionOverlay">
                        <div style="font-size: 3rem; margin-bottom: 12px;">✨</div>
                        <div id="zkrFullMessage" style="font-size: 1.15rem; font-weight: bold; line-height: 1.6;">تقبل الله طاعاتكم</div>
                    </div>
                </div>

                <div class="zkr-nav-footer">
                    <button class="nav-arrow-btn" onclick="navigateAzkar(-1)">السابق</button>
                    <div class="zkr-progress-dots" id="zkrProgressDots">1 / 1</div>
                    <button class="nav-arrow-btn" onclick="navigateAzkar(1)">التالي</button>
                </div>
            </div>

        </div>

        <nav class="bottom-nav-bar">
            <button class="nav-item-btn active" onclick="switchSection('tasbeeh', this)">
                <span class="nav-icon">📿</span>
                <span class="nav-text">المسبحة</span>
            </button>
            <button class="nav-item-btn" onclick="switchSection('morning', this)">
                <span class="nav-icon">☀️</span>
                <span class="nav-text">الصباح</span>
            </button>
            <button class="nav-item-btn" onclick="switchSection('night', this)">
                <span class="nav-icon">🌙</span>
                <span class="nav-text">المساء</span>
            </button>
            <button class="nav-item-btn" onclick="switchSection('post_prayer', this)">
                <span class="nav-icon">🕋</span>
                <span class="nav-text">الصلاة</span>
            </button>
            <button class="nav-item-btn" onclick="switchSection('wrd', this)">
                <span class="nav-icon">📜</span>
                <span class="nav-text">الورد</span>
            </button>
            <button class="nav-item-btn" onclick="switchSection('sleep', this)">
                <span class="nav-icon">🛌</span>
                <span class="nav-text">النوم</span>
            </button>
        </nav>

    </div>

   <script>
        // قواعد البيانات الكاملة والدقيقة للأقسام الـ 5 المدمجة بالتطبيق الموحد
        // قواعد البيانات الكاملة والدقيقة للأقسام الـ 5 المدمجة بالتطبيق الموحد
        const azkarDatabase = {
            morning: {
                title: "أذكار الصباح",
                completionMessage: "✨ تقبل الله طاعاتكم وأذكاركم وصالح أعمالكم في هذا الصباح المبارك.",
                items: [
                    { text: "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ\"", count: 1, benefit: "مَنْ قَالَهَا حِينَ يُصْبِحُ أُجِيرَ مِنَ الْجِنِّ حَتَّى يُمْسِيَ، وَمَنْ قَالَهَا حِينَ يُمْسِي أُجِيرَ مِنَ الْجِنِّ حَتَّى يُصْبِحَ" },
                    { text: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ\n\"قُلْ هُوَ اللَّهُ أَحَدٌ ﴿١﴾ اللَّهُ الصَّمَدُ ﴿٢﴾ لَمْ يَلِدْ وَلَمْ يُولَدْ ﴿٣﴾ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ ﴿٤﴾\"", count: 3, benefit: "مَنْ قَالَهَا حِينَ يُصْبِحُ وَحِينَ يُمْسِي كَفَتْهُ مِنْ كُلِّ شَيْءٍ" },

                    { text: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ\n\"تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ ﴿١﴾ الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلًا  وَهُوَ الْعَزِيزُ الْغَفُورُ ﴿٢﴾ الَّذِي خَلَقَ سَبْعَ سَمَاوَاتٍ طِبَاقًا  مَا تَرَىٰ فِي خَلْقِ الرَّحْمَٰنِ مِنْ تَفَاوُتٍ  فَارْجِعِ الْبَصَرَ هَلْ تَرَىٰ مِنْ فُطُورٍ ﴿٣﴾ ثُمَّ ارْجِعِ الْبَصَرَ كَرَّتَيْنِ يَنْقَلِبْ إِلَيْكَ الْبَصَرُ خَاسِئًا وَهُوَ حَسِيرٌ ﴿٤﴾ وَلَقَدْ زَيَّنَّا السَّمَاءَ الدُّنْيَا بِمَصَابِيحَ وَجَعَلْنَاهَا رُجُومًا لِلشَّيَاطِينِ  وَأَعْتَدْنَا لَهُمْ عَذَابَ السَّعِيرِ ﴿٥﴾ وَلِلَّذِينَ كَفَرُوا بِرَبِّهِمْ عَذَابُ جَهَنَّمَ  وَبِئْسَ الْمَصِيرُ ﴿٦﴾ إِذَا أُلْقُوا فِيهَا سَمِعُوا لَهَا شَهِيقًا وَهِيَ تَفُورُ ﴿٧﴾ تَكَادُ تَمَيَّزُ مِنَ الْغَيْظِ  كُلَّمَا أُلْقِيَ فِيهَا فَوْجٌ سَأَلَهُمْ خزَنَتُهَا أَلَمْ يَأْتِكُمْ نَذِيرٌ ﴿٨﴾ قَالُوا بَلَىٰ قَدْ جَاءَنَا نَذِيرٌ فَكَذَّبْنَا وَقُلْنَا مَا نَزَّلَ اللَّهُ مِنْ شَيْءٍ إِنْ أَنْتُمْ إِلَّا فِي ضَلَالٍ كَبِيرٍ ﴿٩﴾ وَقَالُوا لَوْ كُنَّا نَسْمَعُ أَوْ نَعْقِلُ مَا كُنَّا فِي أَصْحَابِ السَّعِيرِ ﴿١٠﴾ فَاعْتَرَفُوا بِذَنْبِهِمْ فَسُحْقًا لِأَصْحَابِ السَّعِيرِ ﴿١١﴾ إِنَّ الَّذِينَ يَخْشَوْنَ رَبَّهُمْ بِالْغَيْبِ لَهُمْ مَغْفِرَةٌ وَأَجْرٌ كَبِيرٌ ﴿١٢﴾ وَأَسِرُّوا قَوْلَكُمْ أَوِ اجْهَرُوا بِهِ  إِنَّهُ عَلِيمٌ بِذَاتِ الصُّدُورِ ﴿١٣﴾ أَلَا يَعْلَمُ مَنْ خَلَقَ وَهُوَ اللَّطِيفُ الْخَبِيرُ ﴿١٤﴾ هُوَ الَّذِي جَعَلَ لَكُمُ الْأَرْضَ ذَلُولًا فَامْشُوا فِي مَنَاكِبِهَا وَكُلُوا مِنْ رِزْقِهِ  وَإِلَيْهِ النُّشُورُ ﴿١٥﴾ أَأَمِنْتُمْ مَنْ فِي السَّمَاءِ أَنْ يَخْسِفَ بِكُمُ الْأَرْضَ فَإِذَا هِيَ تَمُورُ ﴿١٦﴾ أَمْ أَمِنْتُمْ مَنْ فِي السَّمَاءِ أَنْ يُرْسِلَ عَلَيْكُمْ حَاصِبًا  فَسَتَعْلَمُونَ كَيْفَ نَذِيرِ ﴿١٧﴾ وَلَقَدْ كَذَّبَ الَّذِينَ مِنْ قَبْلِهِمْ فَكَيْفَ كَانَ نَكِيرِ ﴿١٨﴾ أَوَلَمْ يَرَوْا إِلَى الطَّيْرِ فَوْقَهُمْ صَافَّاتٍ وَيَقْبِضْنَ  مَا يُمْسِكُهُنَّ إِلَّا الرَّحْمَٰنُ  إِنَّهُ بِكُلِّ شَيْءٍ بَصِيرٌ ﴿١٩﴾ أَمَّنْ هَٰذَا الَّذِي هُوَ جُنْدٌ لَكُمْ يَنْصُرُكُمْ مِنْ دُونِ الرَّحْمَٰنِ  إِنِ الْكَافِرُونَ إِلَّا فِي غُرُورٍ ﴿٢٠﴾ أَمَّنْ هَٰذَا الَّذِي يَرْزُقُكُمْ إِنْ أَمْسَكَ رِزْقَهُ  بَلْ لَجُّوا فِي عُتُوٍّ وَنُفُورٍ ﴿٢١﴾ أَفَمَنْ يَمْشِي مُكِبًّا عَلَىٰ وَجْهِهِ أَهْدَىٰ أَمَّنْ يَمْشِي سَوِيًّا عَلَىٰ صِرَاطٍ مُسْتَقِيمٍ ﴿٢٢﴾ قُلْ هُوَ الَّذِي أَنْشَأَكُمْ وَجَعَلَ لَكُمُ السَّمْعَ وَالْأَبْصَارَ وَالْأَفْئِدَةَ  قَلِيلًا مَا تَشْكُرُونَ ﴿٢٣﴾ قُلْ هُوَ الَّذِي ذَرَأَكُمْ فِي الْأَرْضِ وَإِلَيْهِ تُشُورُونَ ﴿٢٤﴾ وَيَقُولُونَ مَتَىٰ هَٰذَا الْوَعْدُ إِنْ كُنْتُمْ صَادِقِينَ ﴿٢٥﴾ قُلْ إِنَّمَا الْعِلْمُ عِنْدَ اللَّهِ وَإِنَّمَا أَنَا نَذِيرٌ مُبِينٌ ﴿٢٦﴾ فَلَمَّا رَأَوْهُ زُلْفَةً سِيئَتْ وُجُوهُ الَّذِينَ كَفَرُوا وَقِيلَ هَٰذَا الَّذِي كُنْتُمْ بِهِ تَدَّعُونَ ﴿٢٧﴾ قُلْ أَرَأَيْتُمْ إِنْ أَهْلَكَنِيَ اللَّهُ وَمَنْ مَعِيَ أَوْ رَحِمَنَا فَمَنْ يُجِيرُ الْكَافِرِينَ مِنْ عَذَابٍ أَلِيمٍ ﴿٢٨﴾ قُلْ هُوَ الرَّحْمَٰنُ آمَنَّا بِهِ وَعَلَيْهِ تَوَكَّلْنَا  فَسَتَعْلَمُونَ مَنْ هُوَ فِي ضَلَالٍ مُبِينٍ ﴿٢٩﴾ قُلْ أَرَأَيْتُمْ إِنْ أَصْبَحَ مَاؤُكُمْ غَوْرًا فَمَنْ يَأْتِيكُمْ بِمَاءٍ مَعِينٍ ﴿٣٠﴾\"", count: 1, benefit: "كانَ رَسُولُ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ لَا يَنَامُ حَتَّى يَقْرَأَ {الم تَنزِيلُ} السَّجْدَةِ وَ{تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ}" },
                    { text: "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ\n\"الم ﴿١﴾ تَنْزِيلُ الْكِتَابِ لَا رَيْبَ فِيهِ مِنْ رَبِّ الْعَالَمِينَ ﴿٢﴾ أَمْ يَقُولُونَ افْتَرَاهُ  بَلْ هُوَ الْحَقُّ مِنْ رَبِّكَ لِتُنْذِرَ قَوْمًا مَا أَتَاهُمْ مِنْ نَذِيرٍ مِنْ قَبْلِكَ لَعَلَّهُمْ يَهْتَدُونَ ﴿٣﴾ اللَّهُ الَّذِي خَلَقَ السَّمَاوَاتِ وَالْأَرْضَ وَمَا بَيْنَهُمَا فِي سِتَّةِ أَيَّامٍ ثُمَّ اسْتَوَىٰ عَلَى الْعَرْشِ  مَا لَكُمْ مِنْ دُونِهِ مِنْ وَلِيٍّ وَلَا شَفِيعٍ  أَفَلَا تَتَذَكَّرُونَ ﴿٤﴾ يُدَبِّرُ الْأَمْرَ مِنَ السَّمَاءِ إِلَى الْأَرْضِ ثُمَّ يَعْرُجُ إِلَيْهِ فِي يَوْمٍ كَانَ مِقْدَارُهُ أَلْفَ سَنَةٍ مِمَّا تَعُدُّونَ ﴿٥﴾ ذَٰلِكَ عَالِمُ الْغَيْبِ وَالشَّهَادَةِ الْعَزِيزُ الرَّحِيمُ ﴿٦﴾ الَّذِي أَحْسَنَ كُلَّ شَيْءٍ خَلَقَهُ  وَبَدَأَ خَلْقَ الْإِنْسَانِ مِنْ طِينٍ ﴿٧﴾ ثُمَّ جَعَلَ نَسْلَهُ مِنْ سُلَالَةٍ مِنْ مَاءٍ مَهِينٍ ﴿٨﴾ ثُمَّ سَوَّاهُ وَنَفَخَ فِيهِ مِنْ رُوحِهِ  وَجَعَلَ لَكُمُ السَّمْعَ وَالْأَبْصَارَ وَالْأَفْئِدَةَ  قَلِيلًا مَا تَشْكُرُونَ ﴿٩﴾ وَقَالُوا أَإِذَا ضَلَلْنَا فِي الْأَرْضِ أَإِنَّا لَفِي خَلْقٍ جَدِيدٍ  بَلْ هُمْ بِلِقَاءِ رَبِّهِمْ كافِرُونَ ﴿١٠﴾  قُلْ يَتَوَفَّاكُمْ مَلَكُ الْمَوْتِ الَّذِي وُكِّلَ بِكُمْ ثُمَّ إِلَىٰ رَبِّكُمْ تُرْجَعُونَ ﴿١١﴾ وَلَوْ تَرَىٰ إِذِ الْمُجْرِمُونَ نَاكِسُو رُءُوسِهِمْ عِنْدَ رَبِّهِمْ رَبَّنَا أَبْصَرْنَا وَسَمِعْنَا فَارْجِعْنَا نَعْمَلْ صَالِحًا إِنَّا مُوقِنُونَ ﴿١٢﴾ وَلَوْ شِئْنَا لَآتَيْنَا كُلَّ نَفْسٍ هُدَاهَا وَلَٰكِنْ حَقَّ الْقَوْلُ مِنِّي لَأَمْلَأَنَّ جَهَنَّمَ مِنَ الْجِنَّةِ وَالنَّاسِ أَجْمَعِينَ ﴿١٣﴾ فَذُوقُوا بِمَا نَسِيتُمْ لِقَاءَ يَوْمِكُمْ هَٰذَا إِنَّا نَسِينَاكُمْ  وَذُوقُوا عَذَابَ الْخُلْدِ بِمَا كُنْتُمْ تَعْمَلُونَ ﴿١٤﴾ إِنَّمَا يُؤْمِنُ بِآيَاتِنا الَّذِينَ إِذَا ذُكِّرُوا بِهَا خَرُّوا سُجَّدًا وَسَبَّحُوا بِحَمْدِ رَبِّهِمْ وَهُمْ لَا يَسْتَكْبِرُونَ  ﴿١٥﴾ تَتَجَافَىٰ جُنُوبُهُمْ عَنِ الْمَضَاجِعِ يَدْعُونَ رَبَّهُمْ خَوْفًا وَطَمَعًا وَمِمَّا رَزَقْنَاهُمْ يُنْفِقُونَ ﴿١٦﴾ فَلَا تَعْلَمُ نَفْسٌ مَا أُخْفِيَ لَهُمْ مِنْ قُرَّةِ أَعْيُنٍ جَزَاءً بِمَا كَانُوا يَعْمَلُونَ ﴿١٧﴾ أَفَمَنْ كَانَ مُؤْمِنًا كَمَنْ كَانَ فَاسِقًا  لَا يَسْتَوُونَ ﴿١٨﴾ أَمَّا الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ فَلَهُمْ جَنَّاتُ الْمَأْوَىٰ نُزُلًا بِمَا كَانُوا يَعْمَلُونَ ﴿١٩﴾ وَأَمَّا الَّذِينَ فَسَقُوا فَمَأْوَاهُمُ النَّارُ  كُلَّمَا أَرَادُوا أَنْ يَخْرُجُوا مِنْهَا أُعِيدُوا فِيهَا وَقِيلَ لَهُمْ ذُوقُوا عَذَابَ النَّارِ الَّذِي كُنْتُمْ بِهِ تُكَذِّبُونَ ﴿٢٠﴾ وَلَنُذِيقَنَّهُمْ مِنَ الْعَذَابِ الْأَدْنَىٰ دُونَ الْعَذَابِ الْأَكْبَرِ لَعَلَّهُمْ يَرْجِعُونَ ﴿٢١﴾ وَمَنْ أَظْلَمُ مِمَّنْ ذُكِّرَ بِآيَاتِ رَبِّهِ ثُمَّ أَعْرَضَ عَنْهَا  إِنَّا مِنَ الْمُجْرِمِينَ مُنْتَقِمُونَ ﴿٢٢﴾ وَلَقَدْ آتَيْنَا مُوسَى الْكِتَابَ فَلَا تَكُنْ فِي مِرْيَةٍ مِنْ لِقَائِهِ  وَجَعَلْنَاهُ هُدًى لِبَنِي إِسْرَائِيلَ ﴿٢٣﴾ وَجَعَلْنَا مِنْهُمْ أَئِمَّةً يَهْدُونَ بِأَمْرِنَا لَمَّا صَبَرُوا  وَكَانُوا بِآيَاتِنَا يُوقِنُونَ ﴿٢٤﴾ إِنَّ رَبَّكَ هُوَ يَفْصِلُ بَيْنَهُمْ يَوْمَ الْقِيَامَةِ فِيمَا كَانُوا فِيهِ يَخْتَلِفُونَ ﴿٢٥﴾ أَوَلَمْ يَهْدِ لَهُمْ كَمْ أَهْلَكْنَا مِنْ قَبْلِهِمْ مِنَ الْقُرُونِ يَمْشُونَ فِي مَسَاكِنِهِمْ  إِنَّ فِي ذَٰلِكَ لَآيَاتٍ  أَفَلَا يَسْمَعُونَ ﴿٢٦﴾ أَوَلَمْ يَرَوْا أَنَّا نَسُوقُ الْمَاءَ إِلَى الْأَرْضِ الْجُرُزِ فَنُخْرِجُ بِهِ زَرْعًا تَأْكُلُ مِنْهُ أَنْعَامُهُمْ وَأَنْفُسُهُمْ  أَفَلَا يُبْصِرُونَ ﴿٢٧﴾ وَيَقُولُونَ مَتَىٰ هَٰذَا الْفَتْحُ إِنْ كُنْتُمْ صَادِقِينَ ﴿٢٨﴾ قُلْ يَوْمَ الْفَتْحِ لَا يَنْفَعُ الَّذِينَ كَفَرُوا إِيمَانُهُمْ وَلَا هُمْ يُنْظَرُونَ ﴿٢٩﴾ فَأَعْرِضْ عَنْهُمْ وَانْتَظِرْ إِنَّهُمْ مُنْتَظِرُونَ ﴿٣٠﴾\"", count: 1, benefit: "كانَ رَسُولُ اللَّهِ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ لَا يَنَامُ حَتَّى يَقْرَأَ {الم تَنزِيلُ} السَّجْدَةِ وَ{تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ}" },
                    { text: "نَسْأَلُكُمُ أَنْ تَذْكُرُونَا فِي دُعَائِكُمْ الصَّالِحِ، وَجَزَاكُمُ اللَّهُ خَيْرًا", count: 1, benefit: null }

        // الذاكرة التخزينية الديناميكية للتطبيق
        let currentSection = 'tasbeeh'; // القسم البدائي النشط
        let tasbeehCount = 0;
        let tasbeehTarget = 0; // 0 تعني عداد مفتوح

        // كشاف مؤشرات الأذكار الحالية لكل قسم
        let azkarIndices = { morning: 0, night: 0, post_prayer: 0, wrd: 0, sleep: 0 };
        let progressDatabase = {}; 

        // تشغيل وإعداد البنية التحتية والبيانات للبرنامج
        function initApp() {
            // استرجاع البيانات المحفوظة سابقاً
            const savedTasbeeh = localStorage.getItem('app_tasbeeh_v3_count');
            if (savedTasbeeh) tasbeehCount = parseInt(savedTasbeeh);
            
            const savedProgress = localStorage.getItem('app_azkar_v3_progress');
            if (savedProgress) {
                progressDatabase = JSON.parse(savedProgress);
            } else {
                resetAllDatabaseProgress();
            }

            document.getElementById('tasbeehDisplay').innerText = tasbeehCount;
            updateHeaderStats();
        }

        function resetAllDatabaseProgress() {
            progressDatabase = {};
            for (let sec in azkarDatabase) {
                progressDatabase[sec] = {};
                azkarDatabase[sec].items.forEach((item, index) => {
                    progressDatabase[sec][index] = 0;
                });
            }
        }

        // ==================== محرك المسبحة الإلكترونية ====================
        function handleTasbeehClick() {
            tasbeehCount++;
            localStorage.setItem('app_tasbeeh_v3_count', tasbeehCount);
            document.getElementById('tasbeehDisplay').innerText = tasbeehCount;

            if (navigator.vibrate) navigator.vibrate(30); // اهتزاز عد خفيف وممتع

            // التحقق من الوصول للهدف المحدد
            if (tasbeehTarget > 0 && tasbeehCount === tasbeehTarget) {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // اهتزاز نجاح مميز ومزدوج
                alert(`✨ مبارك، تم الوصول لهدفك الحالي وهو: ${tasbeehTarget}`);
            }
            updateHeaderStats();
        }

        function resetTasbeehCount() {
            tasbeehCount = 0;
            localStorage.setItem('app_tasbeeh_v3_count', tasbeehCount);
            document.getElementById('tasbeehDisplay').innerText = tasbeehCount;
            updateHeaderStats();
        }

        function setTasbeehTarget(target, btnElement) {
            tasbeehTarget = target;
            document.querySelectorAll('.target-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            document.getElementById('tasbeehTargetLabel').innerText = target === 0 ? "الهدف: مفتوح" : `الهدف: من ${target}`;
        }

        function promptCustomTarget(btnElement) {
            let userVal = prompt("الرجاء إدخال العدد المستهدف المخصص لك للسبحة:");
            let parsed = parseInt(userVal);
            if (!isNaN(parsed) && parsed > 0) {
                setTasbeehTarget(parsed, btnElement);
            }
        }

        // ==================== محرك إدارة الأذكار والأوراد الذكي ====================
        function syncAzkarView() {
            const templateSection = document.getElementById('section_azkar_template');
            
            if (currentSection === 'tasbeeh') {
                templateSection.classList.remove('active');
                document.getElementById('section_tasbeeh').classList.add('active');
                return;
            }

            document.getElementById('section_tasbeeh').classList.remove('active');
            templateSection.classList.add('active');

            const sectionData = azkarDatabase[currentSection];
            const currentIndex = azkarIndices[currentSection];
            const currentItem = sectionData.items[currentIndex];

            // تعبئة البيانات والنصوص
            document.getElementById('zkrTitle').innerText = `${sectionData.title} - ذكر رقم (${currentIndex + 1})`;
            document.getElementById('zkrText').innerText = currentItem.text;
            document.getElementById('zkrBenefit').innerText = `الملاحظة/الفضل: ${currentItem.benefit}`;
            
            // إرجاع وضع صندوق سطرين تلقائياً عند التنقل
            const textBox = document.getElementById('zkrText');
            textBox.classList.remove('expanded');
            document.getElementById('zkrMoreBtn').innerText = "المزيد";

            // إعداد عداد الكارت
            const currentCount = progressDatabase[currentSection][currentIndex] || 0;
            document.getElementById('zkrCounter').innerText = currentCount;
            document.getElementById('zkrCounterLabel').innerText = `العدد المطلوب لهذا الذكر: ${currentItem.count}`;
            document.getElementById('zkrProgressDots').innerText = `${currentIndex + 1} / ${sectionData.items.length}`;

            // إعداد أغطية النجاح والاكتمال
            const overlay = document.getElementById('zkrSuccessOverlay');
            if (currentCount >= currentItem.count) {
                document.getElementById('zkrCard').classList.add('completed');
                overlay.classList.add('show');
            } else {
                document.getElementById('zkrCard').classList.remove('completed');
                overlay.classList.remove('show');
            }

            // مراجعة اكتمال القسم الكلي
            checkFullSectionCompletion();
        }

        function handleAzkarCardClick() {
            const currentIndex = azkarIndices[currentSection];
            const currentItem = azkarDatabase[currentSection].items[currentIndex];
            const currentCount = progressDatabase[currentSection][currentIndex] || 0;

            if (currentCount >= currentItem.count) return;

            progressDatabase[currentSection][currentIndex]++;
            localStorage.setItem('app_azkar_v3_progress', JSON.stringify(progressDatabase));
            
            document.getElementById('zkrCounter').innerText = progressDatabase[currentSection][currentIndex];
            
            if (navigator.vibrate) navigator.vibrate(30);

            // تفعيل غطاء النجاح للبطاقة
            if (progressDatabase[currentSection][currentIndex] >= currentItem.count) {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                document.getElementById('zkrCard').classList.add('completed');
                document.getElementById('zkrSuccessOverlay').classList.add('show');
            }

            updateHeaderStats();
            checkFullSectionCompletion();
        }

        function toggleZkrText(event) {
            event.stopPropagation(); // منع النقر من زيادة العداد بشكل خاطئ
            const textBox = document.getElementById('zkrText');
            const btn = document.getElementById('zkrMoreBtn');
            if (textBox.classList.contains('expanded')) {
                textBox.classList.remove('expanded');
                btn.innerText = "المزيد";
            } else {
                textBox.classList.add('expanded');
                btn.innerText = "إخفاء";
            }
        }

        function navigateAzkar(direction) {
            const maxItems = azkarDatabase[currentSection].items.length;
            let nextIdx = azkarIndices[currentSection] + direction;
            if (nextIdx >= 0 && nextIdx < maxItems) {
                azkarIndices[currentSection] = nextIdx;
                syncAzkarView();
            }
        }

        function checkFullSectionCompletion() {
            const sectionData = azkarDatabase[currentSection];
            let completedAll = true;

            sectionData.items.forEach((item, index) => {
                if ((progressDatabase[currentSection][index] || 0) < item.count) {
                    completedAll = false;
                }
            });

            const fullOverlay = document.getElementById('zkrFullSectionOverlay');
            if (completedAll) {
                document.getElementById('zkrFullMessage').innerText = sectionData.completionMessage;
                fullOverlay.classList.add('show');
            } else {
                fullOverlay.classList.remove('show');
            }
        }

        // ==================== شريط التحكم والتبديل والتصفير ====================
        function switchSection(sectionKey, btnElement) {
            currentSection = sectionKey;
            
            // تحديث تصميم شريط الأزرار السفلي النشط
            document.querySelectorAll('.nav-item-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // مزامنة وعرض البيانات للقسم المحدد
            syncAzkarView();
            updateHeaderStats();
        }

        function updateHeaderStats() {
            if (currentSection === 'tasbeeh') {
                document.getElementById('headerProgressText').innerText = "المسبحة الإلكترونية";
                document.getElementById('headerPercentage').innerText = `مفتوح`;
                return;
            }

            const sectionData = azkarDatabase[currentSection];
            const totalItems = sectionData.items.length;
            let doneCount = 0;

            sectionData.items.forEach((item, index) => {
                if ((progressDatabase[currentSection][index] || 0) >= item.count) {
                    doneCount++;
                }
            });

            const pct = Math.round((doneCount / totalItems) * 100);
            document.getElementById('headerProgressText').innerText = `${sectionData.title}: ${doneCount} / ${totalItems}`;
            document.getElementById('headerPercentage').innerText = `${pct}%`;
        }

        function resetCurrentSectionData() {
            if (currentSection === 'tasbeeh') {
                resetTasbeehCount();
                return;
            }

            if (confirm(`هل تود بالتأكيد إعادة تصفير وتصفية جميع عدادات قسم (${azkarDatabase[currentSection].title}) الحالي والبدء من جديد؟`)) {
                azkarDatabase[currentSection].items.forEach((item, index) => {
                    progressDatabase[currentSection][index] = 0;
                });
                localStorage.setItem('app_azkar_v3_progress', JSON.stringify(progressDatabase));
                azkarIndices[currentSection] = 0;
                syncAzkarView();
                updateHeaderStats();
            }
        }

        // تشغيل التطبيق الموحد لأول مرة عند التحميل بالمتصفح
        initApp();
    </script>
</body>
</html>
